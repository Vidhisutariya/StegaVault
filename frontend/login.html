<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StegaVault Login</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <div class="login-header">
        <span class="brand-icon">⬡</span>
        <h1>StegaVault Login</h1>
      </div>
      <p class="login-copy">Secure access to your steganography, watermarking, and tamper-detection tools.</p>
      <form id="loginForm" class="login-form">
        <label for="username">Username or email
          <input id="username" name="username" type="text" class="input" placeholder="Enter your username or email" autocomplete="username" />
        </label>
        <label for="password">Password
          <input id="password" name="password" type="password" class="input" placeholder="Enter your password" autocomplete="current-password" />
        </label>
        <div class="form-row">
          <label class="checkbox"><input id="remember" type="checkbox" /> Remember me</label>
          <a class="login-link" href="/">Continue as guest</a>
        </div>
        <div class="login-actions">
          <button type="submit" class="btn btn-p">Sign In</button>
        </div>
        <div id="loginStatus" class="status-msg"></div>
      </form>
      <div class="login-footer">
        <p>Not registered? <a href="/">Open StegaVault</a></p>
      </div>
    </section>
  </main>
  <script src="/static/js/login.js"></script>
</body>
</html>
